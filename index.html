<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#163b6d">
<title>Omie Field CRM</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<style>:root {
  color-scheme: light;
  --bg:#f4f7fb; --panel:#ffffff; --text:#0f172a; --muted:#64748b; --line:#d8e2ee;
  --primary:#163b6d; --primary-2:#0b2545; --primary-soft:#e8f1fb;
  --success:#15803d; --success-soft:#dcfce7; --danger:#dc2626; --danger-soft:#fee2e2;
  --warning:#b45309; --warning-soft:#fef3c7; --info:#2563eb; --info-soft:#dbeafe;
  --shadow:0 16px 36px rgba(15, 23, 42, .08);
}
*{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);color:var(--text)} button,input,select,textarea{font:inherit} button{border:0;cursor:pointer}.app-shell{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}.brand{display:flex;align-items:center;gap:11px;min-width:0}.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(145deg,var(--primary),var(--primary-2));color:white;display:grid;place-items:center;font-weight:900;box-shadow:0 10px 24px rgba(22,59,109,.22);position:relative;overflow:hidden}.logo::before{content:"";position:absolute;inset:9px;border:2px solid rgba(255,255,255,.75);border-radius:8px}.logo::after{content:"";width:14px;height:14px;border-radius:50%;background:#38bdf8;box-shadow:16px 10px 0 #22c55e;transform:translate(-4px,-3px)}.brand h1{margin:0;font-size:18px;line-height:1.1;letter-spacing:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.session{display:flex;align-items:center;gap:8px}.role-pill,.sync-pill{border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;background:var(--primary-soft);color:var(--primary-2);white-space:nowrap}.logout{min-width:44px;height:36px;border-radius:8px;background:#eef3f8;color:#24364f;font-weight:800}.main{width:min(1180px,100%);margin:0 auto;padding:18px}.login{min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at top left,#dbeafe 0,#f8fbff 36%,#f4f7fb 100%)}.login-panel{width:min(520px,100%);background:white;border:1px solid var(--line);border-radius:8px;padding:24px;box-shadow:var(--shadow)}.login-panel h1{margin:0 0 8px;font-size:30px}.login-panel p{margin:0 0 18px;color:var(--muted)}.role-grid{display:grid;gap:10px}.role-button{text-align:left;border-radius:8px;padding:16px;border:1px solid var(--line);background:#fbfdff}.role-button strong{display:block;margin-bottom:4px;color:var(--text)}.role-button span{color:var(--muted);font-size:13px}.role-button:hover{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}.dashboard{display:grid;gap:16px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:15px;box-shadow:0 8px 24px rgba(15,30,46,.04)}.kpi-card{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start;min-height:118px}.kpi-icon{width:40px;height:40px;border-radius:8px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;font-size:21px}.kpi-card strong{display:block;margin:2px 0 3px;font-size:28px;color:var(--primary-2)}.kpi-card span{display:block;color:var(--text);font-size:12px;font-weight:900;text-transform:uppercase}.kpi-card p{margin:0;color:var(--muted);font-size:12px;line-height:1.35}.kpi-card.danger .kpi-icon{background:var(--danger-soft);color:var(--danger)}.kpi-card.danger strong{color:var(--danger)}.kpi-card.success .kpi-icon{background:var(--success-soft);color:var(--success)}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.search{flex:1;min-width:220px;border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:white}.select{border:1px solid var(--line);border-radius:8px;padding:11px 12px;background:white}.layout{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start}.list{display:grid;gap:10px}.opp{text-align:left;background:white;border:1px solid var(--line);border-radius:8px;padding:15px;display:grid;gap:10px;box-shadow:0 10px 24px rgba(15,23,42,.04)}.opp:hover{border-color:var(--primary);box-shadow:0 14px 30px rgba(22,59,109,.10)}.opp-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.opp h2{margin:0;font-size:19px;line-height:1.2;color:var(--primary-2)}.opp-value{font-size:18px;font-weight:950;color:var(--primary);white-space:nowrap}.opp-footer{display:flex;justify-content:space-between;gap:10px;align-items:flex-end;flex-wrap:wrap}.forecast{font-size:12px;color:var(--muted)}.meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:13px}.tag{border-radius:999px;padding:5px 9px;background:#eef3f8;color:#24364f;font-size:12px;font-weight:900}.tag.phase{background:var(--primary-soft);color:var(--primary)}.tag.hot{background:var(--danger-soft);color:var(--danger)}.tag.warm{background:var(--warning-soft);color:var(--warning)}.tag.cold{background:var(--info-soft);color:var(--info)}.due{color:var(--muted);font-size:13px;font-weight:700}.due.overdue{color:var(--danger);background:var(--danger-soft);padding:5px 8px;border-radius:999px}.detail{background:white;border:1px solid var(--line);border-radius:8px;padding:16px;position:sticky;top:82px;box-shadow:0 10px 26px rgba(15,23,42,.05)}.detail h2{margin:0 0 4px;color:var(--primary-2)}.detail-section{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}.form{display:grid;gap:10px}.field{display:grid;gap:5px}.field label{color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 11px;background:white}.field textarea{min-height:92px;resize:vertical}.actions{display:flex;gap:8px;flex-wrap:wrap}.primary{background:var(--primary);color:white;border-radius:8px;padding:11px 13px;font-weight:900;box-shadow:0 10px 18px rgba(22,59,109,.16)}.primary.sync-urgent{background:var(--danger);box-shadow:0 12px 22px rgba(220,38,38,.22)}.secondary{background:#eef3f8;color:#20334f;border-radius:8px;padding:11px 13px;font-weight:900}.note,.request,.pending{border:1px solid var(--line);border-radius:8px;padding:11px;background:#fbfdff}.pending:not(.done){border-color:#fecaca;background:#fff7f7}.note p,.request p,.pending p{margin:5px 0 0;color:var(--muted)}.tabs{position:sticky;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(10px)}.tab{border-radius:8px;padding:8px 4px;background:transparent;color:#52637a;font-weight:900;font-size:11px;display:grid;gap:3px;place-items:center}.tab-icon{font-size:18px;line-height:1}.tab.active{background:var(--primary);color:white}.empty{color:var(--muted);padding:18px;text-align:center}.status-line{color:var(--muted);font-size:13px}@media(max-width:880px){.cards{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.detail{position:static}.session{max-width:48%;justify-content:flex-end}.sync-pill{overflow:hidden;text-overflow:ellipsis}.opp-value{font-size:16px}}@media(max-width:560px){.topbar{padding:12px}.main{padding:12px}.brand h1{font-size:16px}.cards{grid-template-columns:1fr 1fr;gap:8px}.card{padding:12px}.kpi-card{grid-template-columns:1fr;gap:8px;min-height:132px}.kpi-icon{width:34px;height:34px;font-size:18px}.kpi-card strong{font-size:23px}.tabs{grid-template-columns:repeat(5,minmax(0,1fr))}.tab{font-size:10px;padding:7px 2px}.tab-icon{font-size:17px}.login-panel h1{font-size:25px}.opp-head{display:grid}.opp-value{white-space:normal}.opp h2{font-size:18px}}
</style>
</head>
<body>
<div id="app"></div>
<script>const STORAGE_KEY = 'omie-field-crm-state-v1';
const profiles = { salesperson:{label:'Vendedor externo',name:'Ana Souza',hint:'Carteira própria, visitas e solicitações'}, backoffice:{label:'Backoffice',name:'Bruno Lima',hint:'Fila de solicitações e pendências administrativas'}, manager:{label:'Gestor',name:'Carla Mendes',hint:'Indicadores e visão geral'} };
const initialState = { user:null, activeTab:'home', selectedOpportunityId:'opp-1', lastSyncAt:'30/06/2026 14:40', opportunities:[{id:'opp-1',customer:'Mercado Alto Vale',contact:'João Ribeiro',phone:'(11) 98888-1122',email:'joao@altovale.com',phase:'Proposta enviada',temperature:'Quente',value:86500,forecast:'2026-07-18',nextAction:'2026-07-03',priority:'Alta',updatedAt:'2026-06-30 09:20',lastInteraction:'Reunião com compras e financeiro',notes:[{at:'2026-06-29 17:10',author:'Ana Souza',text:'Cliente pediu ajuste no prazo de implantação.'}],requests:[]},{id:'opp-2',customer:'Clínica Bem Viver',contact:'Marina Costa',phone:'(21) 97777-4040',email:'marina@bemviver.com',phase:'Diagnóstico',temperature:'Morna',value:34200,forecast:'2026-08-05',nextAction:'2026-06-28',priority:'Média',updatedAt:'2026-06-24 11:45',lastInteraction:'Ligação de qualificação',notes:[{at:'2026-06-24 11:45',author:'Ana Souza',text:'Concorrente atual oferece desconto agressivo.'}],requests:[]},{id:'opp-3',customer:'Distribuidora Norte Sul',contact:'Paulo Nunes',phone:'(31) 96666-9191',email:'paulo@nortesul.com',phase:'Negociação',temperature:'Quente',value:128000,forecast:'2026-07-25',nextAction:'2026-07-01',priority:'Alta',updatedAt:'2026-06-27 16:15',lastInteraction:'Visita presencial na matriz',notes:[],requests:[{id:'req-1',type:'Contrato',priority:'Alta',status:'Aberta',description:'Revisar cláusula de SLA antes da assinatura.',dueDate:'2026-07-02'}]},{id:'opp-4',customer:'Agro Santa Clara',contact:'Fernanda Lopes',phone:'(17) 95555-3030',email:'fernanda@santaclara.com',phase:'Primeiro contato',temperature:'Fria',value:19800,forecast:'2026-09-10',nextAction:'2026-07-08',priority:'Baixa',updatedAt:'2026-06-18 08:30',lastInteraction:'E-mail inicial respondido',notes:[],requests:[]}], syncQueue:[{id:'sync-1',type:'Observação',target:'Mercado Alto Vale',status:'Aguardando conexão',createdAt:'30/06/2026 13:12'}] };
let state = loadState();
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):structuredClone(initialState)}catch(_){return structuredClone(initialState)}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function money(value){return value.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function todayTime(){return new Date().toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})}
function queueChange(type,opportunity){state.syncQueue.unshift({id:crypto.randomUUID(),type,target:opportunity.customer,status:'Pendente',createdAt:todayTime()})}
function setTab(tab){state.activeTab=tab;saveState();render()}
function selectOpportunity(id){state.selectedOpportunityId=id;state.activeTab='opportunities';saveState();render()}
function selectedOpportunity(){return state.opportunities.find((item)=>item.id===state.selectedOpportunityId)||state.opportunities[0]}
function tempClass(temp){if(temp==='Quente')return'hot';if(temp==='Morna')return'warm';return'cold'}
function login(role){state.user={role,...profiles[role]};saveState();render()}
function logout(){state.user=null;saveState();render()}
function updateOpportunity(event){event.preventDefault();const form=new FormData(event.currentTarget);const opp=selectedOpportunity();opp.phase=String(form.get('phase'));opp.nextAction=String(form.get('nextAction'));opp.forecast=String(form.get('forecast'));opp.updatedAt=todayTime();queueChange('Atualização comercial',opp);saveState();render()}
function addVisitNote(event){event.preventDefault();const form=new FormData(event.currentTarget);const text=String(form.get('note')).trim();if(!text)return;const opp=selectedOpportunity();opp.notes.unshift({at:todayTime(),author:state.user.name,text});opp.lastInteraction=text;opp.updatedAt=todayTime();queueChange('Observação de visita',opp);saveState();render()}
function addBackofficeRequest(event){event.preventDefault();const form=new FormData(event.currentTarget);const opp=selectedOpportunity();opp.requests.unshift({id:crypto.randomUUID(),type:String(form.get('type')),priority:String(form.get('priority')),dueDate:String(form.get('dueDate')),description:String(form.get('description')),status:'Aberta'});queueChange('Solicitação ao backoffice',opp);saveState();render()}
function fakeSync(){state.syncQueue=state.syncQueue.map((item)=>({...item,status:'Sincronizado localmente'}));state.lastSyncAt=todayTime();saveState();render()}
function loginView(){return '<main class="login"><section class="login-panel"><h1>Omie Field CRM</h1><p>Escolha um perfil fictício para testar a primeira versão offline.</p><div class="role-grid">'+Object.entries(profiles).map(([role,profile])=>'<button class="role-button" data-login="'+role+'"><strong>'+profile.label+'</strong><span>'+profile.hint+'</span></button>').join('')+'</div></section></main>'}
function shell(content){return '<div class="app-shell"><header class="topbar"><div class="brand"><div class="logo">O</div><div><h1>Omie Field CRM</h1><p>'+state.user.name+' · '+state.user.label+'</p></div></div><div class="session"><span class="sync-pill">Última sync: '+state.lastSyncAt+'</span><button class="logout" data-action="logout" title="Sair">Sair</button></div></header><main class="main">'+content+'</main>'+tabs()+'</div>'}
function tabs(){const items=[['home','⌂','Início'],['opportunities','▦','Oportun.'],['visit','✎','Visita'],['request','＋','Solicitar'],['sync','↻','Sync']];return '<nav class="tabs">'+items.map(([id,icon,label])=>'<button class="tab '+(state.activeTab===id?'active':'')+'" data-tab="'+id+'"><span class="tab-icon">'+icon+'</span><span>'+label+'</span></button>').join('')+'</nav>'}
function homeView(){const overdue=state.opportunities.filter((opp)=>new Date(opp.nextAction)<new Date('2026-06-30')).length;const requests=state.opportunities.flatMap((opp)=>opp.requests).filter((req)=>req.status==='Aberta').length;return '<section class="dashboard"><div class="cards"><article class="card kpi-card"><div class="kpi-icon">▦</div><div><span>Oportunidades abertas</span><strong>'+state.opportunities.length+'</strong><p>Carteira ativa para acompanhamento em campo.</p></div></article><article class="card kpi-card danger"><div class="kpi-icon">!</div><div><span>Próxima ação vencida</span><strong>'+overdue+'</strong><p>Itens que precisam de retorno comercial.</p></div></article><article class="card kpi-card"><div class="kpi-icon">☷</div><div><span>Solicitações pendentes</span><strong>'+requests+'</strong><p>Demandas abertas para apoio do backoffice.</p></div></article><article class="card kpi-card"><div class="kpi-icon">↻</div><div><span>Aguardando sincronização</span><strong>'+state.syncQueue.filter((i)=>i.status!=='Sincronizado localmente').length+'</strong><p>Alterações salvas neste aparelho.</p></div></article></div>'+opportunitiesView(true)+'</section>'}
function opportunitiesView(compact=false){const opp=selectedOpportunity();return '<div class="layout"><section><div class="toolbar"><input class="search" placeholder="Buscar cliente" data-search><select class="select" data-filter><option value="">Todas as temperaturas</option><option>Quente</option><option>Morna</option><option>Fria</option></select></div><div class="list" id="opportunity-list">'+opportunityList(state.opportunities)+'</div></section>'+(compact?'<aside class="detail"><h2>Resumo rápido</h2><p class="status-line">Toque em uma oportunidade para ver detalhes, registrar visita ou criar solicitação.</p>'+detailSummary(opp)+'</aside>':detailView(opp))+'</div>'}
function opportunityList(items){return items.map((opp)=>{const overdue=new Date(opp.nextAction)<new Date('2026-06-30');return '<button class="opp" data-opp="'+opp.id+'"><div class="opp-head"><div><h2>'+opp.customer+'</h2><div class="meta"><span class="tag phase">'+opp.phase+'</span><span class="tag '+tempClass(opp.temperature)+'">'+opp.temperature+'</span></div></div><div class="opp-value">'+money(opp.value)+'</div></div><div class="opp-footer"><div class="due '+(overdue?'overdue':'')+'">Próxima ação: '+opp.nextAction+'</div><div class="forecast">Previsão: '+opp.forecast+' · Atualizado: '+opp.updatedAt+'</div></div></button>'}).join('')}
function detailSummary(opp){return '<div class="detail-section"><strong>'+opp.customer+'</strong><p class="status-line">'+opp.phase+' · '+money(opp.value)+'</p></div>'}
function detailView(opp){return '<aside class="detail"><h2>'+opp.customer+'</h2><p class="status-line">'+opp.contact+' · '+opp.phone+' · '+opp.email+'</p><div class="detail-section"><div class="meta"><span class="tag">'+opp.phase+'</span><span class="tag '+tempClass(opp.temperature)+'">'+opp.temperature+'</span><span class="tag">'+money(opp.value)+'</span></div><p><strong>Última interação:</strong> '+opp.lastInteraction+'</p></div><div class="detail-section"><h3>Alterar dados comerciais</h3><form class="form" data-form="update"><div class="field"><label>Etapa</label><select name="phase"><option'+selected(opp.phase,'Primeiro contato')+'>Primeiro contato</option><option'+selected(opp.phase,'Diagnóstico')+'>Diagnóstico</option><option'+selected(opp.phase,'Proposta enviada')+'>Proposta enviada</option><option'+selected(opp.phase,'Negociação')+'>Negociação</option><option'+selected(opp.phase,'Fechamento')+'>Fechamento</option></select></div><div class="field"><label>Próxima ação</label><input type="date" name="nextAction" value="'+opp.nextAction+'"></div><div class="field"><label>Previsão de fechamento</label><input type="date" name="forecast" value="'+opp.forecast+'"></div><button class="primary">Salvar offline</button></form></div><div class="detail-section"><h3>Histórico</h3>'+(opp.notes.length?opp.notes.map((note)=>'<article class="note"><strong>'+note.author+' · '+note.at+'</strong><p>'+note.text+'</p></article>').join(''):'<p class="empty">Nenhuma observação registrada.</p>')+'</div></aside>'}
function selected(current,value){return current===value?' selected':''}
function visitView(){const opp=selectedOpportunity();return '<div class="layout"><section class="card"><h2>Registrar visita</h2><p class="status-line">O registro será salvo offline e entrará na fila de sincronização.</p><form class="form" data-form="visit"><div class="field"><label>Oportunidade</label><input value="'+opp.customer+'" disabled></div><div class="field"><label>Resumo da interação</label><textarea name="note" placeholder="Ex.: reunião com decisor, objeções, próximos passos..."></textarea></div><button class="primary">Adicionar observação</button></form></section>'+detailView(opp)+'</div>'}
function requestView(){const opp=selectedOpportunity();const allRequests=state.opportunities.flatMap((item)=>item.requests.map((req)=>({...req,customer:item.customer})));return '<div class="layout"><section class="card"><h2>Nova solicitação ao backoffice</h2><form class="form" data-form="request"><div class="field"><label>Oportunidade</label><input value="'+opp.customer+'" disabled></div><div class="field"><label>Tipo</label><select name="type"><option>Cadastro</option><option>Contrato</option><option>Documento</option><option>Condição comercial</option></select></div><div class="field"><label>Prioridade</label><select name="priority"><option>Alta</option><option>Média</option><option>Baixa</option></select></div><div class="field"><label>Prazo desejado</label><input type="date" name="dueDate" value="2026-07-05"></div><div class="field"><label>Descrição</label><textarea name="description" required></textarea></div><button class="primary">Criar solicitação</button></form></section><aside class="detail"><h2>Fila do backoffice</h2>'+(allRequests.length?allRequests.map((req)=>'<article class="request"><strong>'+req.customer+' · '+req.type+'</strong><p>'+req.description+'</p><p>'+req.priority+' · '+req.status+' · Prazo '+req.dueDate+'</p></article>').join(''):'<p class="empty">Nenhuma solicitação aberta.</p>')+'</aside></div>'}
function syncView(){return '<section class="card"><div class="opp-head"><div><h2>Pendências de sincronização</h2><p class="status-line">Nesta versão, a sincronização é simulada e os dados continuam no aparelho.</p></div><button class="primary '+(state.syncQueue.some((item)=>item.status!=='Sincronizado localmente')?'sync-urgent':'')+'" data-action="sync">Sincronizar agora</button></div><div class="list" style="margin-top:14px">'+(state.syncQueue.length?state.syncQueue.map((item)=>'<article class="pending '+(item.status==='Sincronizado localmente'?'done':'')+'"><strong>'+item.type+' · '+item.target+'</strong><p>'+item.status+' · '+item.createdAt+'</p></article>').join(''):'<p class="empty">Sem pendências.</p>')+'</div></section>'}
function managerView(){if(state.user.role!=='manager')return'';const byPhase=state.opportunities.reduce((acc,opp)=>((acc[opp.phase]=(acc[opp.phase]||0)+1),acc),{});return '<section class="card"><h2>Painel de gestão</h2><div class="meta">'+Object.entries(byPhase).map(([phase,total])=>'<span class="tag">'+phase+': '+total+'</span>').join('')+'</div></section>'}
function currentView(){if(state.activeTab==='home')return homeView()+managerView();if(state.activeTab==='opportunities')return opportunitiesView();if(state.activeTab==='visit')return visitView();if(state.activeTab==='request')return requestView();return syncView()}
function render(){const app=document.querySelector('#app');app.innerHTML=state.user?shell(currentView()):loginView()}
document.addEventListener('click',(event)=>{const target=event.target.closest('button');if(!target)return;if(target.dataset.login)login(target.dataset.login);if(target.dataset.tab)setTab(target.dataset.tab);if(target.dataset.opp)selectOpportunity(target.dataset.opp);if(target.dataset.action==='logout')logout();if(target.dataset.action==='sync')fakeSync()});
document.addEventListener('submit',(event)=>{const form=event.target;if(form.dataset.form==='update')updateOpportunity(event);if(form.dataset.form==='visit')addVisitNote(event);if(form.dataset.form==='request')addBackofficeRequest(event)});
document.addEventListener('input',(event)=>{if(!event.target.matches('[data-search], [data-filter]'))return;const search=document.querySelector('[data-search]')?.value.toLowerCase()||'';const temp=document.querySelector('[data-filter]')?.value||'';const list=state.opportunities.filter((opp)=>opp.customer.toLowerCase().includes(search)&&(!temp||opp.temperature===temp));document.querySelector('#opportunity-list').innerHTML=list.length?opportunityList(list):'<p class="empty">Nenhuma oportunidade encontrada.</p>'});
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'))}
render();
</script>
</body>
</html>
